name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/ko/ntk/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build NTK extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Prepare signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -di > signingkey.jks

      # 서명 키로부터 SHA-256 해시 지문을 자동으로 추출합니다.
      - name: Extract signing key fingerprint
        run: |
          FINGERPRINT=$(keytool -list -v -keystore signingkey.jks -alias hsp-key -storepass 846845 | grep -i SHA256 | awk '{print $2}' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "$FINGERPRINT" > fingerprint.txt

      # 빌드 전 서식을 자동 교정(spotlessApply)한 후 NTK 익스텐션만 빌드합니다.
      - name: Build NTK Only
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :src:ko:ntk:spotlessApply
          ./gradlew :src:ko:ntk:assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "individual-apks-1"
          path: "**/*.apk"
          retention-days: 1

      - name: Upload fingerprint artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fingerprint
          path: fingerprint.txt
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish:
    name: Publish extension repo
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ~/apk-artifacts

      - name: Download fingerprint artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fingerprint
          path: ~/fingerprint

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: main
          persist-credentials: false

      - name: Create repo artifacts
        run: |
          cd main
          python ./.github/scripts/move-built-apks.py
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py

      - name: Checkout repo branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hsp1020/extensions
          token: ${{ secrets.BOT_PAT }}
          ref: repo
          path: repo
          persist-credentials: true

      - name: Merge and deploy repo
        run: |
          cd repo
          # 1. 포크하면서 따라온 기존의 400여 개 잔여 파일들을 완전히 정리합니다.
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +
          
          # 2. 이번에 빌드된 새 데이터(index.json, index.pb, apk 폴더 등)를 덮어씌웁니다.
          cp -r ../main/repo/* .
          
          # 3. 내 고유 서명 키 지문 정보가 들어간 유효한 repo.json 파일을 동적 생성합니다.
          FINGERPRINT=$(cat ~/fingerprint/fingerprint.txt)
          cat <<EOF > repo.json
          {
            "index_v2": "https://github.com/hsp1020/extensions/raw/repo/index.pb",
            "meta": {
              "name": "hsp1020 Extensions",
              "website": "https://github.com/hsp1020/extensions",
              "signingKeyFingerprint": "$FINGERPRINT"
            }
          }
          EOF
          
          # 4. 저장소를 최종 커밋하고 푸시합니다.
          ../main/.github/scripts/commit-repo.sh
